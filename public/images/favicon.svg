<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ДИКО — магазин для необычных питомцев">
  <!-- backdrop -->
  <rect width="64" height="64" rx="14" fill="#1f1b2d"/>
  <!-- soft brand glow -->
  <circle cx="32" cy="32" r="21" fill="#8c52ff" opacity="0.15"/>
  <!-- ears -->
  <circle cx="20" cy="20" r="7" fill="#ecc94b"/>
  <circle cx="44" cy="20" r="7" fill="#ecc94b"/>
  <circle cx="20" cy="19" r="3.1" fill="#8c52ff"/>
  <circle cx="44" cy="19" r="3.1" fill="#8c52ff"/>
  <!-- head -->
  <rect x="14" y="24" width="36" height="30" rx="14" fill="#ecc94b"/>
  <!-- snout -->
  <ellipse cx="32" cy="45" rx="11" ry="8" fill="#f7f1de"/>
  <!-- eyes -->
  <circle cx="24" cy="33" r="3.5" fill="#1f1b2d"/>
  <circle cx="40" cy="33" r="3.5" fill="#1f1b2d"/>
  <circle cx="25.2" cy="31.8" r="1" fill="#ffffff"/>
  <circle cx="41.2" cy="31.8" r="1" fill="#ffffff"/>
  <!-- mouth -->
  <rect x="27.5" y="44" width="9" height="6" rx="3" fill="#1f1b2d"/>
  <!-- nose -->
  <ellipse cx="32" cy="40" rx="4.6" ry="3" fill="#1f1b2d"/>
  <!-- buck teeth -->
  <rect x="29" y="43" width="2.7" height="6.6" rx="1.1" fill="#ffffff"/>
  <rect x="32.3" y="43" width="2.7" height="6.6" rx="1.1" fill="#ffffff"/>
</svg>
